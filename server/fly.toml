# Fly.io app config — MAALEX backend
# Edit `app` to whatever name `fly launch` registers, then redeploy with:
#   fly deploy
app = "maalex-backend"
primary_region = "fra"   # Frankfurt — closest free region with low latency to Telesom

[env]
  NODE_ENV = "production"
  PORT = "4000"
  ALLOWED_ORIGIN = "*"   # tighten this once you have a real frontend domain
  SESSION_TTL_MINUTES = "30"

[build]
  # Fly will detect Node from package.json automatically.

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false   # keep machine alive — auto-transfer monitor needs it
  auto_start_machines = true
  min_machines_running = 1     # always 1 instance up

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"   # 256MB RAM — fits the free tier allowance
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
